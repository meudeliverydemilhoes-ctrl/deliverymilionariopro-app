<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Delivery Milionário Pro</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>body{margin:0;font-family:system-ui,sans-serif}@keyframes spin{to{transform:rotate(360deg)}}.spin{animation:spin 1s linear infinite}input,select,textarea{outline:none}</style>
</head>
<body class="bg-gray-900 text-gray-100">
<div id="login-page" class="min-h-screen flex items-center justify-center p-4"><div class="w-full max-w-md"><div class="text-center mb-8"><div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center mx-auto mb-4"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></div><h1 class="text-2xl font-bold text-white">Delivery Milionário Pro</h1><p class="text-gray-400 text-sm mt-2">CRM inteligente com WhatsApp e IA</p></div><div class="bg-gray-800/80 border border-gray-700/50 rounded-2xl p-6"><h2 class="text-lg font-semibold text-white mb-4">Entrar</h2><div id="login-error" class="hidden mb-4 p-3 bg-red-500/10 border border-red-500/30 rounded-lg text-red-400 text-sm"></div><form id="login-form" class="space-y-4"><div><label class="block text-sm text-gray-400 mb-1">Email</label><input id="login-email" type="email" required placeholder="seu@email.com" class="w-full px-4 py-2.5 bg-gray-700/50 border border-gray-600/50 rounded-lg text-sm text-white placeholder-gray-400 focus:border-indigo-500"></div><div><label class="block text-sm text-gray-400 mb-1">Senha</label><input id="login-pw" type="password" required placeholder="........" class="w-full px-4 py-2.5 bg-gray-700/50 border border-gray-600/50 rounded-lg text-sm text-white placeholder-gray-400 focus:border-indigo-500"></div><button type="submit" id="login-btn" class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 text-white rounded-lg text-sm font-medium">Entrar</button></form></div></div></div>
<div id="app" class="hidden flex h-screen overflow-hidden"><aside class="w-56 bg-gray-800/80 border-r border-gray-700/50 flex flex-col flex-shrink-0"><div class="p-3 border-b border-gray-700/50 flex items-center gap-2"><div class="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></div><div><p class="text-xs font-bold text-white">Delivery</p><p class="text-xs font-bold text-indigo-400">Milionário Pro</p></div></div><nav class="flex-1 p-2 space-y-1" id="nav-items"></nav><div class="p-3 border-t border-gray-700/50"><button onclick="logout()" class="w-full flex items-center gap-2 px-3 py-2 text-red-400 hover:bg-red-600/20 rounded-lg text-sm">Sair</button></div></aside><main class="flex-1 flex flex-col overflow-hidden"><header class="h-12 bg-gray-800/50 border-b border-gray-700/50 flex items-center justify-end px-4"><div class="flex items-center gap-2 px-3 py-1 bg-gray-700/50 rounded-lg"><div id="user-avatar" class="w-6 h-6 rounded-full bg-indigo-600 flex items-center justify-center text-white text-xs font-bold"></div><span id="user-name" class="text-sm text-white"></span></div></header><div class="flex-1 overflow-y-auto p-5" id="content"></div></main></div>
<script>
const API="https://backend-production-d5145.up.railway.app/api/v1";let token=null,currentUser=null,currentPage="dashboard";
async function ac(p,o={}){const h={"Content-Type":"application/json"};if(token)h["Authorization"]="Bearer "+token;const r=await fetch(API+p,{...o,headers:h});const d=await r.json();if(!r.ok)throw new Error(d.message||"Erro");return d}
const get=p=>ac(p),post=(p,b)=>ac(p,{method:"POST",body:JSON.stringify(b)}),patch=(p,b)=>ac(p,{method:"PATCH",body:JSON.stringify(b)});
const gi=n=>n?n.split(" ").map(x=>x[0]).join("").toUpperCase().slice(0,2):"??";
const nv=[{id:"dashboard",l:"Dashboard",e:"📊"},{id:"crm",l:"CRM Kanban",e:"🎯"},{id:"chat",l:"Chat WhatsApp",e:"💬"},{id:"dispatch",l:"Disparos",e:"📤"},{id:"reports",l:"Relatórios",e:"📈"},{id:"scorecard",l:"Scorecard",e:"🏆"},{id:"settings",l:"Configurações",e:"⚙️"}];
function rn(){document.getElementById("nav-items").innerHTML=nv.map(n=>'<button onclick="gt(\''+n.id+'\' )" class="w-full flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-medium '+(currentPage===n.id?'bg-indigo-600/20 text-indigo-400 border border-indigo-500/30':'text-gray-400 hover:text-white hover:bg-gray-700/50 border border-transparent')+'"><span>'+n.e+'</span><span>'+n.l+'</span></button>').join("")}
function gt(p){currentPage=p;rn();rp()}
function st(l,v,c){const cs={indigo:"from-indigo-500/20 to-indigo-600/10 border-indigo-500/30",green:"from-green-500/20 to-green-600/10 border-green-500/30",yellow:"from-yellow-500/20 to-yellow-600/10 border-yellow-500/30",red:"from-red-500/20 to-red-600/10 border-red-500/30",purple:"from-purple-500/20 to-purple-600/10 border-purple-500/30"};return '<div class="bg-gradient-to-br '+cs[c]+' border rounded-xl p-4"><p class="text-2xl font-bold text-white">'+v+'</p><p class="text-sm text-gray-400 mt-1">'+l+'</p></div>'}
const ld='<div class="flex items-center justify-center p-12"><svg class="spin text-indigo-400" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10" opacity="0.25"/><path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round"/></svg></div>';
async function rp(){const el=document.getElementById("content");el.innerHTML=ld;try{const fn={dashboard:rD,crm:rC,chat:rCh,dispatch:rDi,reports:rR,scorecard:rSc,settings:rSe};if(fn[currentPage])await fn[currentPage](el);else el.innerHTML="Pagina: "+currentPage}catch(e){el.innerHTML='<p class="text-red-400">'+e.message+'</p>'}}
async function rD(el){let s={};try{s=(await get("/reports/dashboard")).data||{}}catch(e){}let w=null;try{w=(await get("/whatsapp/status")).data}catch(e){}const cn=w&&w.status==="connected";el.innerHTML='<div class="space-y-6"><div class="flex items-center justify-between"><div><h1 class="text-2xl font-bold text-white">Dashboard</h1></div><span class="px-3 py-1.5 rounded-full text-xs font-medium '+(cn?'bg-green-500/20 text-green-400 border border-green-500/30':'bg-red-500/20 text-red-400 border border-red-500/30')+'">'+(cn?'✅ Conectado':'❌ Desconectado')+'</span></div><div class="grid grid-cols-2 lg:grid-cols-4 gap-4">'+st("Leads",s.totalLeads||0,"indigo")+st("Conversas",s.openConversations||0,"purple")+st("Follow-ups",s.pendingFollowups||0,"yellow")+st("Conversão",(s.conversionRate||0)+"%","green")+'</div></div>'}
async function rC(el){let ls=[];try{ls=(await get("/leads?limit=100")).data||[]}catch(e){}const sg=[{id:"lead",l:"Novo Lead",c:"#6366f1"},{id:"contact",l:"Contato",c:"#8b5cf6"},{id:"proposal",l:"Proposta",c:"#f59e0b"},{id:"closed",l:"Fechado",c:"#22c55e"}];let h='<div class="space-y-4"><div class="flex justify-between"><h1 class="text-2xl font-bold text-white">CRM</h1><button onclick="nlf()" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg text-sm font-medium">+ Lead</button></div><div id="nla"></div><div class="flex gap-4 overflow-x-auto pb-4" style="min-height:60vh">';sg.forEach(s=>{const sl=ls.filter(x=>x.stage===s.id);h+='<div class="flex-shrink-0 w-72" ondragover="event.preventDefault()" ondrop="dl(\''+s.id+'\')"><div class="bg-gray-800/50 border border-gray-700/50 rounded-xl p-4 h-full"><div class="flex items-center gap-2 mb-4"><span class="w-3 h-3 rounded-full" style="background:'+s.c+'"></span><h3 class="text-sm font-semibold text-white">'+s.l+'</h3><span class="bg-gray-700 text-gray-300 text-xs px-2 rounded-full">'+sl.length+'</span></div><div class="space-y-3">';if(!sl.length)h+='<p class="text-xs text-gray-600 text-center py-6">Vazio</p>';sl.forEach(l=>{h+='<div draggable="true" ondragstart="ds(\''+l.id+'\' )" class="bg-gray-900/50 border border-gray-700/50 rounded-lg p-3 cursor-grab hover:border-indigo-500/30"><div class="flex items-center gap-2"><div class="w-8 h-8 rounded-full bg-indigo-600/80 flex items-center justify-center text-white text-xs font-bold">'+gi(l.name)+'</div><div class="flex-1 min-w-0"><p class="text-sm text-white truncate">'+l.name+'</p><p class="text-xs text-gray-500">'+(l.phone||"")+'</p></div></div></div>'});h+='</div></div></div>'});h+='</div></div>';el.innerHTML=h}
window._d=null;window.ds=id=>{window._d=id};window.dl=async s=>{if(!window._d)return;try{await patch("/leads/"+window._d+"/stage",{stage:s});window._d=null;rp()}catch(e){alert(e.message)}};
window.nlf=()=>{document.getElementById("nla").innerHTML='<div class="bg-gray-800/50 border border-gray-700/50 rounded-xl p-4 flex gap-3 mb-2"><input id="nn" placeholder="Nome" class="flex-1 px-3 py-2 bg-gray-700/50 border border-gray-600/50 rounded-lg text-sm text-white placeholder-gray-400"><input id="np" placeholder="Telefone" class="flex-1 px-3 py-2 bg-gray-700/50 border border-gray-600/50 rounded-lg text-sm text-white placeholder-gray-400"><button onclick="crl()" class="px-4 py-2 bg-green-600 text-white rounded-lg text-sm">Salvar</button></div>'};
window.crl=async()=>{try{await post("/leads",{name:document.getElementById("nn").value,phone:document.getElementById("np").value});rp()}catch(e){alert(e.message)}};
async function rCh(el){let cs=[];try{cs=(await get("/conversations?limit=50")).data||[]}catch(e){}let h='<div class="flex h-[calc(100vh-140px)] rounded-xl overflow-hidden border border-gray-700/50"><div class="w-72 bg-gray-800/80 border-r border-gray-700/50 overflow-y-auto">';if(!cs.length)h+='<p class="text-gray-500 text-sm text-center py-8">Nenhuma conversa</p>';cs.forEach(c=>{h+='<div onclick="oc(\''+c.id+'\',\''+((c.lead_name||"").replace(/'/g,""))+'\' )" class="flex items-center gap-3 p-3 cursor-pointer border-b border-gray-700/30 hover:bg-gray-700/30"><div class="w-10 h-10 rounded-full bg-indigo-600/80 flex items-center justify-center text-white text-sm font-bold">'+gi(c.lead_name)+'</div><div class="flex-1 min-w-0"><p class="text-sm text-white truncate">'+(c.lead_name||"?")+'</p><p class="text-xs text-gray-400 truncate">'+(c.last_message||"")+'</p></div></div>'});h+='</div><div class="flex-1 flex items-center justify-center text-gray-500 text-sm" id="ca">Selecione uma conversa</div></div>';el.innerHTML=h}
window.oc=async(id,nm)=>{const a=document.getElementById("ca");a.innerHTML=ld;let ms=[];try{ms=(await get("/messages/"+id)).data||[]}catch(e){}let h='<div class="flex flex-col h-full w-full"><div class="p-3 border-b border-gray-700/50 bg-gray-800/50"><p class="text-sm font-medium text-white">'+nm+'</p></div><div class="flex-1 overflow-y-auto p-4 space-y-3">';if(!ms.length)h+='<p class="text-gray-600 text-sm text-center py-8">Sem mensagens</p>';ms.forEach(m=>{const mine=m.from_type==="attendant"||m.from_type==="bot";h+='<div class="flex '+(mine?"justify-end":"justify-start")+'"><div class="max-w-xs px-4 py-2 rounded-2xl '+(m.from_type==="attendant"?"bg-indigo-600 text-white":m.from_type==="bot"?"bg-purple-600/80 text-white":"bg-gray-700 text-gray-100")+'">'+(m.from_type==="bot"?'<p class="text-xs text-purple-300 mb-1">🤖 Bot</p>':"")+'<p class="text-sm">'+(m.content||"")+'</p></div></div>'});h+='</div><div class="p-3 border-t border-gray-700/50 flex gap-2"><input id="mi" placeholder="Mensagem..." class="flex-1 px-4 py-2 bg-gray-700/50 border border-gray-600/50 rounded-full text-sm text-white placeholder-gray-400"><button onclick="sm(\''+id+'\',\''+nm+'\' )" class="px-4 py-2 bg-indigo-600 rounded-lg text-white text-sm font-medium">Enviar</button></div></div>';a.innerHTML=h};
window.sm=async(id,nm)=>{const i=document.getElementById("mi");if(!i.value.trim())return;try{await post("/messages/send",{conversation_id:id,content:i.value});i.value="";oc(id,nm)}catch(e){alert(e.message)}};
async function rDi(el){let cs=[];try{cs=(await get("/campaigns?limit=20")).data||[]}catch(e){}let h='<div class="space-y-6"><h1 class="text-2xl font-bold text-white">Disparos</h1><div class="bg-gray-800/50 border border-gray-700/50 rounded-xl p-5 space-y-4"><input id="cpn" placeholder="Nome" class="w-full px-3 py-2 bg-gray-700/50 border border-gray-600/50 rounded-lg text-sm text-white placeholder-gray-400"><textarea id="cpm" placeholder="Mensagem..." rows="3" class="w-full px-3 py-2 bg-gray-700/50 border border-gray-600/50 rounded-lg text-sm text-white placeholder-gray-400 resize-none"></textarea><button onclick="ccp()" class="px-4 py-2 bg-green-600 text-white rounded-lg text-sm font-medium">Criar</button></div><div class="bg-gray-800/50 border border-gray-700/50 rounded-xl overflow-hidden"><table class="w-full"><thead><tr class="border-b border-gray-700/50"><th class="text-left text-xs text-gray-400 px-4 py-3">Nome</th><th class="text-left text-xs text-gray-400 px-4 py-3">Status</th></tr></thead><tbody>';if(!cs.length)h+='<tr><td colspan="2" class="text-center text-gray-500 py-8 text-sm">Nenhuma</td></tr>';cs.forEach(d=>{h+='<tr class="border-b border-gray-700/30"><td class="px-4 py-3 text-sm text-white">'+d.name+'</td><td class="px-4 py-3"><span class="px-2 py-1 rounded-full text-xs bg-gray-500/20 text-gray-400">'+(d.status||"draft")+'</span></td></tr>'});h+='</tbody></table></div></div>';el.innerHTML=h}
window.ccp=async()=>{try{await post("/campaigns",{name:document.getElementById("cpn").value,message_template:document.getElementById("cpm").value});rp()}catch(e){alert(e.message)}};
async function rR(el){let b={},f={};try{b=(await get("/reports/bot-performance")).data||{}}catch(e){}try{f=(await get("/reports/funnel")).data||{}}catch(e){}el.innerHTML='<div class="space-y-6"><h1 class="text-2xl font-bold text-white">Relatórios</h1><div class="grid grid-cols-2 lg:grid-cols-4 gap-4">'+st("Bot",b.totalResponses||0,"purple")+st("Resolução",(b.resolutionRate||0)+"%","green")+st("Tempo",(b.avgResponseTime||0)+"s","indigo")+st("Satisfação",b.satisfaction||0,"yellow")+'</div><h2 class="text-lg font-semibold text-white mt-4">Funil</h2><div class="grid grid-cols-2 lg:grid-cols-4 gap-4">'+st("Leads",f.lead||0,"indigo")+st("Contato",f.contact||0,"purple")+st("Proposta",f.proposal||0,"yellow")+st("Fechado",f.closed||0,"green")+'</div></div>'}
async function rSc(el){let s=[];try{s=(await get("/reports/sellers")).data||[]}catch(e){}if(!s.length){el.innerHTML='<h1 class="text-2xl font-bold text-white">Scorecard</h1><p class="text-gray-500 text-center py-12">Sem dados</p>';return}let h='<div class="space-y-6"><h1 class="text-2xl font-bold text-white">Scorecard</h1><div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4">';s.forEach((x,i)=>{h+='<div class="bg-gray-800/50 border rounded-xl p-5 '+(i===0?"border-yellow-500/50":"border-gray-700/50")+'">'+(i===0?'<p class="text-yellow-400 text-xs mb-3">🏆 Melhor</p>':"")+'<div class="flex items-center gap-3 mb-4"><div class="w-12 h-12 rounded-full flex items-center justify-center text-white font-bold '+(i===0?"bg-yellow-600":"bg-indigo-600")+'">'+gi(x.name)+'</div><p class="text-white font-semibold">'+(x.name||"")+'</p></div><div class="space-y-2"><div class="flex justify-between"><span class="text-xs text-gray-400">Leads</span><span class="text-sm text-white">'+(x.leads_count||0)+'</span></div><div class="flex justify-between"><span class="text-xs text-gray-400">Vendas</span><span class="text-sm text-green-400">'+(x.closed_count||0)+'</span></div></div></div>'});h+='</div></div>';el.innerHTML=h}
async function rSe(el){let w=null,us=[];try{w=(await get("/whatsapp/status")).data}catch(e){}try{us=(await get("/users")).data||[]}catch(e){}const cn=w&&w.status==="connected";let h='<div class="space-y-6"><h1 class="text-2xl font-bold text-white">Configurações</h1><div class="bg-gray-800/50 border border-gray-700/50 rounded-xl p-5"><h3 class="text-white font-semibold mb-4">WhatsApp</h3><div class="flex gap-3 items-center"><span class="px-3 py-1.5 rounded-full text-xs font-medium '+(cn?"bg-green-500/20 text-green-400 border border-green-500/30":"bg-red-500/20 text-red-400 border border-red-500/30")+'">'+(cn?"✅ Conectado":"❌ Desconectado")+'</span><button onclick="cw()" class="px-4 py-2 bg-green-600 text-white rounded-lg text-sm font-medium">Conectar</button></div><div id="qra" class="mt-4"></div></div><div class="bg-gray-800/50 border border-gray-700/50 rounded-xl p-5"><h3 class="text-white font-semibold mb-4">Equipe</h3><div class="space-y-3">';if(!us.length)h+='<p class="text-gray-500 text-sm text-center py-4">Nenhum</p>';us.forEach(u=>{h+='<div class="flex items-center gap-3 p-3 bg-gray-700/30 rounded-lg"><div class="w-10 h-10 rounded-full bg-indigo-600 flex items-center justify-center text-white font-bold text-sm">'+gi(u.name)+'</div><div class="flex-1"><p class="text-sm text-white">'+u.name+'</p><p class="text-xs text-gray-400">'+u.email+'</p></div><span class="px-2 py-1 bg-indigo-500/20 text-indigo-400 rounded-full text-xs">'+u.role+'</span></div>'});h+='</div></div></div>';el.innerHTML=h}
window.cw=async()=>{try{const r=await post("/whatsapp/connect",{instance_name:"delivery-main"});const q=r.data?.qrcode||r.qrcode;if(q)document.getElementById("qra").innerHTML='<img src="'+q+'" class="w-48 h-48 bg-white rounded-xl p-2">';else rp()}catch(e){alert(e.message)}};
document.getElementById("login-form").onsubmit=async function(e){e.preventDefault();const b=document.getElementById("login-btn"),er=document.getElementById("login-error");b.disabled=true;b.textContent="Entrando...";er.classList.add("hidden");try{const r=await post("/auth/login",{email:document.getElementById("login-email").value,password:document.getElementById("login-pw").value});token=r.data.token;currentUser=r.data.user;document.getElementById("login-page").classList.add("hidden");document.getElementById("app").classList.remove("hidden");document.getElementById("user-name").textContent=currentUser.name;document.getElementById("user-avatar").textContent=gi(currentUser.name);rn();rp()}catch(x){er.textContent=x.message;er.classList.remove("hidden")}b.disabled=false;b.textContent="Entrar"};
window.logout=()=>{token=null;currentUser=null;document.getElementById("app").classList.add("hidden");document.getElementById("login-page").classList.remove("hidden")};
</script></body></html>
