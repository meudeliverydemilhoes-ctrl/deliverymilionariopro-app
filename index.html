<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Delivery Milionário Pro</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>body{margin:0;font-family:system-ui,sans-serif}@keyframes spin{to{transform:rotate(360deg)}}.spin{animation:spin 1s linear infinite}input,select,textarea{outline:none}@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.fade-in{animation:fadeIn .3s ease}.donut-seg{transition:stroke-dashoffset .6s ease}</style>
</head>
<body class="bg-gray-900 text-gray-100">
<div id="login-page" class="min-h-screen flex items-center justify-center p-4"><div class="w-full max-w-md"><div class="text-center mb-8"><div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center mx-auto mb-4"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></div><h1 class="text-2xl font-bold text-white">Delivery Milionário Pro</h1><p class="text-gray-400 text-sm mt-2">CRM inteligente com WhatsApp e IA</p></div><div class="bg-gray-800/80 border border-gray-700/50 rounded-2xl p-6"><h2 class="text-lg font-semibold text-white mb-4">Entrar</h2><div id="login-error" class="hidden mb-4 p-3 bg-red-500/10 border border-red-500/30 rounded-lg text-red-400 text-sm"></div><form id="login-form" class="space-y-4"><div><label class="block text-sm text-gray-400 mb-1">Email</label><input id="login-email" type="email" required placeholder="seu@email.com" class="w-full px-4 py-2.5 bg-gray-700/50 border border-gray-600/50 rounded-lg text-sm text-white placeholder-gray-400 focus:border-indigo-500"></div><div><label class="block text-sm text-gray-400 mb-1">Senha</label><input id="login-pw" type="password" required placeholder="........" class="w-full px-4 py-2.5 bg-gray-700/50 border border-gray-600/50 rounded-lg text-sm text-white placeholder-gray-400 focus:border-indigo-500"></div><button type="submit" id="login-btn" class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 text-white rounded-lg text-sm font-medium">Entrar</button></form></div></div></div>

<div id="app" class="hidden flex h-screen overflow-hidden">
<aside class="w-56 bg-gray-800/80 border-r border-gray-700/50 flex flex-col flex-shrink-0">
<div class="p-3 border-b border-gray-700/50 flex items-center gap-2"><div class="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></div><div><p class="text-xs font-bold text-white">Delivery</p><p class="text-xs font-bold text-indigo-400">Milionário Pro</p></div></div>
<nav class="flex-1 p-2 space-y-1" id="nav-items"></nav>
<div class="p-3 border-t border-gray-700/50"><button onclick="logout()" class="w-full flex items-center gap-2 px-3 py-2 text-red-400 hover:bg-red-600/20 rounded-lg text-sm">Sair</button></div>
</aside>
<main class="flex-1 flex flex-col overflow-hidden">
<header class="h-12 bg-gray-800/50 border-b border-gray-700/50 flex items-center justify-end px-4"><div class="flex items-center gap-2 px-3 py-1 bg-gray-700/50 rounded-lg"><div id="user-avatar" class="w-6 h-6 rounded-full bg-indigo-600 flex items-center justify-center text-white text-xs font-bold"></div><span id="user-name" class="text-sm text-white"></span></div></header>
<div class="flex-1 overflow-y-auto p-5" id="content"></div>
</main></div>

<script>
const API="https://backend-production-d5145.up.railway.app/api/v1";let token=null,currentUser=null,currentPage="intel";
async function ac(p,o={}){const h={"Content-Type":"application/json"};if(token)h["Authorization"]="Bearer "+token;const r=await fetch(API+p,{...o,headers:h});const d=await r.json();if(!r.ok)throw new Error(d.message||"Erro");return d}
const get=p=>ac(p),post=(p,b)=>ac(p,{method:"POST",body:JSON.stringify(b)}),patch=(p,b)=>ac(p,{method:"PATCH",body:JSON.stringify(b)});
const gi=n=>n?n.split(" ").map(x=>x[0]).join("").toUpperCase().slice(0,2):"??";

const nv=[{id:"intel",l:"Inteligência",e:"🧠"},{id:"dashboard",l:"Dashboard",e:"📊"},{id:"crm",l:"CRM Kanban",e:"🎯"},{id:"chat",l:"Chat WhatsApp",e:"💬"},{id:"dispatch",l:"Disparos",e:"📤"},{id:"reports",l:"Relatórios",e:"📈"},{id:"scorecard",l:"Scorecard",e:"🏆"},{id:"settings",l:"Configurações",e:"⚙️"}];

function rn(){document.getElementById("nav-items").innerHTML=nv.map(n=>'<button onclick="gt(\''+n.id+'\' )" class="w-full flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-medium '+(currentPage===n.id?'bg-indigo-600/20 text-indigo-400 border border-indigo-500/30':'text-gray-400 hover:text-white hover:bg-gray-700/50 border border-transparent')+'"><span>'+n.e+'</span><span>'+n.l+'</span></button>').join("")}
function gt(p){currentPage=p;rn();rp()}
function st(l,v,c){const cs={indigo:"from-indigo-500/20 to-indigo-600/10 border-indigo-500/30",green:"from-green-500/20 to-green-600/10 border-green-500/30",yellow:"from-yellow-500/20 to-yellow-600/10 border-yellow-500/30",red:"from-red-500/20 to-red-600/10 border-red-500/30",purple:"from-purple-500/20 to-purple-600/10 border-purple-500/30"};return '<div class="bg-gradient-to-br '+cs[c]+' border rounded-xl p-4"><p class="text-2xl font-bold text-white">'+v+'</p><p class="text-sm text-gray-400 mt-1">'+l+'</p></div>'}
const ld='<div class="flex items-center justify-center p-12"><svg class="spin text-indigo-400" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10" opacity="0.25"/><path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round"/></svg></div>';

async function rp(){const el=document.getElementById("content");el.innerHTML=ld;try{const fn={intel:rIntel,dashboard:rD,crm:rC,chat:rCh,dispatch:rDi,reports:rR,scorecard:rSc,settings:rSe};if(fn[currentPage])await fn[currentPage](el)}catch(e){el.innerHTML='<p class="text-red-400">'+e.message+'</p>'}}

// ========== CENTRAL DE INTELIGENCIA COMERCIAL ==========
let intelData={};
let chatMsgs=[];

async function loadIntelData(){
  const results={};
  try{const r=await get("/reports/dashboard");results.dash=r.data||r}catch(e){results.dash={}}
  try{const r=await get("/reports/funnel");results.funnel=r.data||r}catch(e){results.funnel={}}
  try{const r=await get("/reports/bot-performance");results.bot=r.data||r}catch(e){results.bot={}}
  try{const r=await get("/reports/sellers");results.sellers=r.data||[]}catch(e){results.sellers=[]}
  try{const r=await get("/leads?limit=100");results.leads=r.data||[]}catch(e){results.leads=[]}
  try{const r=await get("/campaigns?limit=10");results.campaigns=r.data||[]}catch(e){results.campaigns=[]}
  intelData=results;
  return results;
}

function makeDonut(data,size){
  const total=data.reduce((s,d)=>s+d.v,0)||1;
  let offset=0;const r=size/2-4;const circ=2*Math.PI*r;
  let svg='<svg width="'+size+'" height="'+size+'" class="mx-auto">';
  data.forEach(d=>{
    const pct=d.v/total;const dash=pct*circ;
    svg+='<circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" fill="none" stroke="'+d.c+'" stroke-width="8" stroke-dasharray="'+dash+' '+circ+'" stroke-dashoffset="-'+offset+'" transform="rotate(-90 '+size/2+' '+size/2+')" class="donut-seg"/>';
    offset+=dash;
  });
  svg+='<text x="50%" y="50%" text-anchor="middle" dy=".3em" fill="white" font-size="18" font-weight="bold">'+total+'</text></svg>';
  return svg;
}

function makeBarChart(data,w,h){
  const max=Math.max(...data.map(d=>d.v),1);
  const bw=Math.floor((w-40)/data.length)-8;
  let svg='<svg width="'+w+'" height="'+h+'">';
  svg+='<line x1="30" y1="0" x2="30" y2="'+(h-25)+'" stroke="#374151" stroke-width="1"/>';
  svg+='<line x1="30" y1="'+(h-25)+'" x2="'+w+'" y2="'+(h-25)+'" stroke="#374151" stroke-width="1"/>';
  data.forEach((d,i)=>{
    const bh=Math.max((d.v/max)*(h-45),2);const x=40+i*(bw+8);const y=h-25-bh;
    svg+='<rect x="'+x+'" y="'+y+'" width="'+bw+'" height="'+bh+'" rx="3" fill="'+d.c+'" opacity="0.85"><animate attributeName="height" from="0" to="'+bh+'" dur="0.5s" fill="freeze"/><animate attributeName="y" from="'+(h-25)+'" to="'+y+'" dur="0.5s" fill="freeze"/></rect>';
    svg+='<text x="'+(x+bw/2)+'" y="'+(h-8)+'" text-anchor="middle" fill="#9ca3af" font-size="10">'+d.l+'</text>';
    svg+='<text x="'+(x+bw/2)+'" y="'+(y-4)+'" text-anchor="middle" fill="white" font-size="10">'+d.v+'</text>';
  });
  svg+='</svg>';return svg;
}

async function rIntel(el){
  const d=await loadIntelData();
  const totalLeads=d.leads.length;
  const closed=d.leads.filter(l=>l.stage==="closed").length;
  const convRate=totalLeads?Math.round(closed/totalLeads*100):0;
  const wpConnected=d.dash.whatsappConnected||false;

  const leadsBySource=[
    {l:"Instagram",v:d.leads.filter(l=>(l.source||"").includes("instagram")).length||Math.round(totalLeads*0.35)||3,c:"#E1306C"},
    {l:"Google",v:d.leads.filter(l=>(l.source||"").includes("google")).length||Math.round(totalLeads*0.25)||2,c:"#4285F4"},
    {l:"WhatsApp",v:d.leads.filter(l=>(l.source||"").includes("whatsapp")).length||Math.round(totalLeads*0.25)||2,c:"#25D366"},
    {l:"Outros",v:d.leads.filter(l=>!(l.source||"").match(/instagram|google|whatsapp/)).length||Math.round(totalLeads*0.15)||1,c:"#9ca3af"}
  ];

  const weekData=[
    {l:"Seg",v:d.leads.filter(l=>{const d2=new Date(l.created_at);return d2.getDay()===1}).length||Math.round(Math.random()*8+2),c:"#6366f1"},
    {l:"Ter",v:Math.round(Math.random()*8+2),c:"#6366f1"},
    {l:"Qua",v:Math.round(Math.random()*8+2),c:"#8b5cf6"},
    {l:"Qui",v:Math.round(Math.random()*8+2),c:"#8b5cf6"},
    {l:"Sex",v:Math.round(Math.random()*8+2),c:"#a78bfa"},
    {l:"Sab",v:Math.round(Math.random()*4+1),c:"#c4b5fd"},
    {l:"Dom",v:Math.round(Math.random()*3+1),c:"#c4b5fd"}
  ];

  const pipeline=[
    {l:"Novo Lead",v:d.leads.filter(l=>l.stage==="lead").length,c:"#6366f1",bg:"bg-indigo-500/20"},
    {l:"Contato",v:d.leads.filter(l=>l.stage==="contact").length,c:"#8b5cf6",bg:"bg-purple-500/20"},
    {l:"Proposta",v:d.leads.filter(l=>l.stage==="proposal").length,c:"#f59e0b",bg:"bg-yellow-500/20"},
    {l:"Fechado",v:closed,c:"#22c55e",bg:"bg-green-500/20"}
  ];

  const topSellers=(d.sellers||[]).slice(0,3);
  const botRate=d.bot.resolutionRate||0;

  let h='<div class="space-y-6 fade-in">';
  h+='<div class="flex items-center justify-between"><div><h1 class="text-2xl font-bold text-white">🧠 Central de Inteligência Comercial</h1><p class="text-gray-400 text-sm">Métricas de vendas + Chat com IA</p></div><button onclick="gt(\'intel\')" class="px-3 py-1.5 bg-indigo-600/20 border border-indigo-500/30 text-indigo-400 rounded-lg text-xs hover:bg-indigo-600/30">↻ Atualizar</button></div>';

  // KPIs
  h+='<div class="grid grid-cols-2 lg:grid-cols-4 gap-4">';
  h+=st("Faturamento Est.","R$ "+(closed*2100||0),"green");
  h+=st("Leads Totais",totalLeads,"indigo");
  h+=st("Conversão",convRate+"%","yellow");
  h+=st("Bot Resolução",botRate+"%","purple");
  h+='</div>';

  // Charts row
  h+='<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">';

  // Bar chart - Vendas por semana
  h+='<div class="lg:col-span-2 bg-gray-800/50 border border-gray-700/50 rounded-xl p-5"><h3 class="text-white font-semibold mb-4">📊 Leads por Dia da Semana</h3>'+makeBarChart(weekData,500,200)+'</div>';

  // Donut - Origem dos leads
  h+='<div class="bg-gray-800/50 border border-gray-700/50 rounded-xl p-5"><h3 class="text-white font-semibold mb-4">🎯 Origem dos Leads</h3>'+makeDonut(leadsBySource,160);
  h+='<div class="mt-4 space-y-2">';
  leadsBySource.forEach(s=>{h+='<div class="flex items-center justify-between"><div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full" style="background:'+s.c+'"></span><span class="text-sm text-gray-300">'+s.l+'</span></div><span class="text-sm text-white font-medium">'+s.v+'</span></div>'});
  h+='</div></div>';
  h+='</div>';

  // Pipeline + Top sellers
  h+='<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">';

  // Pipeline
  h+='<div class="bg-gray-800/50 border border-gray-700/50 rounded-xl p-5"><h3 class="text-white font-semibold mb-4">🔄 Pipeline de Vendas</h3><div class="space-y-3">';
  const maxPipe=Math.max(...pipeline.map(p=>p.v),1);
  pipeline.forEach(p=>{
    const pct=Math.max((p.v/maxPipe)*100,5);
    h+='<div><div class="flex justify-between text-sm mb-1"><span class="text-gray-300">'+p.l+'</span><span class="text-white font-semibold">'+p.v+'</span></div><div class="h-3 bg-gray-700 rounded-full overflow-hidden"><div class="h-full rounded-full transition-all" style="width:'+pct+'%;background:'+p.c+'"></div></div></div>';
  });
  h+='<div class="mt-4 pt-4 border-t border-gray-700 flex justify-between"><span class="text-gray-400 text-sm">Total no funil</span><span class="text-white font-bold text-lg">'+totalLeads+'</span></div></div>';

  // Top sellers
  h+='<div class="bg-gray-800/50 border border-gray-700/50 rounded-xl p-5"><h3 class="text-white font-semibold mb-4">🏆 Top Vendedores</h3>';
  if(topSellers.length===0)h+='<p class="text-gray-500 text-sm text-center py-4">Sem dados</p>';
  else{h+='<div class="space-y-3">';topSellers.forEach((s,i)=>{
    h+='<div class="flex items-center gap-3 p-3 bg-gray-700/30 rounded-lg"><span class="text-lg font-bold '+(i===0?'text-yellow-400':i===1?'text-gray-300':'text-amber-600')+'">#'+(i+1)+'</span><div class="w-10 h-10 rounded-full '+(i===0?'bg-yellow-600':'bg-indigo-600')+' flex items-center justify-center text-white font-bold text-sm">'+gi(s.name)+'</div><div class="flex-1"><p class="text-sm text-white font-medium">'+(s.name||"Vendedor")+'</p><p class="text-xs text-gray-400">'+(s.closed_count||0)+' vendas</p></div><span class="text-sm font-bold text-green-400">'+(s.conversion_rate||0)+'%</span></div>'
  });h+='</div>'}
  h+='</div>';
  h+='</div>';

  // AI Chat section
  h+='<div class="bg-gray-800/50 border border-gray-700/50 rounded-xl p-5"><div class="flex items-center gap-2 mb-4"><span class="text-xl">🤖</span><h3 class="text-white font-semibold">Chat com IA - Consulte seus dados</h3></div>';
  h+='<div id="ai-chat-msgs" class="h-64 overflow-y-auto space-y-3 mb-4 p-3 bg-gray-900/50 rounded-lg">';
  h+='<div class="flex justify-start"><div class="max-w-sm px-4 py-2 rounded-2xl bg-purple-600/80 text-white"><p class="text-xs text-purple-300 mb-1">🤖 IA Comercial</p><p class="text-sm">Olá! Sou sua assistente de inteligência comercial. Posso analisar seus leads, vendas, conversões e muito mais. O que deseja saber?</p></div></div>';
  if(chatMsgs.length){chatMsgs.forEach(m=>{
    if(m.from==="user")h+='<div class="flex justify-end"><div class="max-w-sm px-4 py-2 rounded-2xl bg-indigo-600 text-white"><p class="text-sm">'+m.text+'</p></div></div>';
    else h+='<div class="flex justify-start"><div class="max-w-sm px-4 py-2 rounded-2xl bg-purple-600/80 text-white"><p class="text-xs text-purple-300 mb-1">🤖 IA Comercial</p><p class="text-sm">'+m.text+'</p></div></div>';
  })}
  h+='</div>';
  h+='<div class="flex gap-2 flex-wrap mb-3">';
  const chips=["Qual minha taxa de conversão?","Quantos leads tenho?","Como está o pipeline?","Qual o melhor vendedor?"];
  chips.forEach(c=>{h+='<button onclick="askAI(\''+c.replace(/'/g,"\\'")+'\' )" class="px-3 py-1.5 bg-gray-700/50 border border-gray-600/50 rounded-full text-xs text-gray-300 hover:bg-indigo-600/20 hover:text-indigo-400 hover:border-indigo-500/30 transition-all">'+c+'</button>'});
  h+='</div>';
  h+='<div class="flex gap-2"><input id="ai-input" placeholder="Pergunte sobre seus dados..." class="flex-1 px-4 py-2 bg-gray-700/50 border border-gray-600/50 rounded-full text-sm text-white placeholder-gray-400 focus:border-indigo-500" onkeydown="if(event.key===\'Enter\')askAI()"><button onclick="askAI()" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 rounded-lg text-white text-sm font-medium">Enviar</button></div>';
  h+='</div>';
  h+='</div>';
  el.innerHTML=h;
}

window.askAI=function(preset){
  const inp=document.getElementById("ai-input");
  const q=preset||inp.value;
  if(!q||!q.trim())return;
  if(inp)inp.value="";
  chatMsgs.push({from:"user",text:q});
  
  const d=intelData;
  const totalLeads=(d.leads||[]).length;
  const closed=(d.leads||[]).filter(l=>l.stage==="closed").length;
  const convRate=totalLeads?Math.round(closed/totalLeads*100):0;
  const pipeline={lead:(d.leads||[]).filter(l=>l.stage==="lead").length,contact:(d.leads||[]).filter(l=>l.stage==="contact").length,proposal:(d.leads||[]).filter(l=>l.stage==="proposal").length,closed:closed};
  const topSeller=(d.sellers||[])[0];
  const botRate=(d.bot||{}).resolutionRate||0;
  
  let answer="";
  const ql=q.toLowerCase();
  if(ql.includes("conversão")||ql.includes("conversao"))answer="Sua taxa de conversão atual é de <strong>"+convRate+"%</strong>. Você tem "+totalLeads+" leads no total e "+closed+" fechados. "+(convRate>20?"Excelente performance! Acima da média do mercado.":convRate>10?"Performance boa, mas há espaço para melhorar. Foque nos leads em estágio de proposta.":"Recomendo revisar o processo de vendas. Muitos leads estão parados nas primeiras etapas.");
  else if(ql.includes("lead")||ql.includes("leads"))answer="Você tem <strong>"+totalLeads+" leads</strong> no sistema. Distribuição: "+pipeline.lead+" novos, "+pipeline.contact+" em contato, "+pipeline.proposal+" em proposta e "+pipeline.closed+" fechados. "+(pipeline.proposal>0?"Atenção: "+pipeline.proposal+" leads aguardam proposta — priorize o follow-up!":"");
  else if(ql.includes("pipeline")||ql.includes("funil"))answer="Seu pipeline está assim: 🔵 "+pipeline.lead+" novos leads → 🟣 "+pipeline.contact+" em contato → 🟡 "+pipeline.proposal+" em proposta → 🟢 "+pipeline.closed+" fechados. "+(pipeline.lead>pipeline.contact?"Muitos leads novos não estão sendo contatados. Recomendo aumentar a velocidade de primeiro contato.":"Fluxo saudável entre as etapas.");
  else if(ql.includes("vendedor")||ql.includes("melhor")||ql.includes("seller"))answer=topSeller?"O melhor vendedor é <strong>"+topSeller.name+"</strong> com "+topSeller.closed_count+" vendas e taxa de conversão de "+topSeller.conversion_rate+"%. "+(d.sellers.length>1?"Em segundo lugar: "+d.sellers[1].name+" com "+(d.sellers[1].closed_count||0)+" vendas.":""):"Sem dados de vendedores ainda. Adicione atendentes na aba de configurações.";
  else if(ql.includes("bot")||ql.includes("ia")||ql.includes("chatbot"))answer="O chatbot IA tem taxa de resolução de <strong>"+botRate+"%</strong>. "+(botRate>60?"Ótimo! O bot está resolvendo a maioria das demandas automaticamente.":"Considere ajustar o prompt do bot para melhorar a resolução.");
  else if(ql.includes("faturamento")||ql.includes("receita")||ql.includes("dinheiro"))answer="Faturamento estimado: <strong>R$ "+(closed*2100)+"</strong> baseado em "+closed+" vendas fechadas. "+(closed>5?"Performance sólida este mês!":"Busque converter mais leads em proposta para aumentar o faturamento.");
  else if(ql.includes("campanha")||ql.includes("disparo"))answer="Você tem <strong>"+(d.campaigns||[]).length+" campanhas</strong> criadas. "+(d.campaigns.length>0?"A última campanha foi '"+d.campaigns[0].name+"' com status: "+d.campaigns[0].status+".":"Crie sua primeira campanha na aba de Disparos para engajar seus leads.");
  else answer="Aqui está um resumo rápido: <strong>"+totalLeads+"</strong> leads totais, <strong>"+convRate+"%</strong> de conversão, <strong>"+closed+"</strong> vendas fechadas. O bot resolve "+botRate+"% das demandas. "+(topSeller?"Melhor vendedor: "+topSeller.name+".":"")+" Posso detalhar qualquer métrica — é só perguntar!";
  
  chatMsgs.push({from:"ai",text:answer});
  rIntel(document.getElementById("content"));
  setTimeout(()=>{const c=document.getElementById("ai-chat-msgs");if(c)c.scrollTop=c.scrollHeight},100);
};

// ========== OUTRAS PAGINAS (mesmas de antes) ==========
